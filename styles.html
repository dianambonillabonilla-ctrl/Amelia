<style>
:root{--ink:#18332d;--muted:#6d7d78;--green:#1f6b58;--green2:#dcece5;--cream:#f6f3ea;--card:#fff;--line:#dfe6e2;--red:#b44d49;--amber:#b77a1f;--shadow:0 12px 36px rgba(25,54,46,.08)}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;background:var(--cream);color:var(--ink)}button,input,select,textarea{font:inherit}.hidden{display:none!important}.login-page{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 10% 10%,#e6f1eb,transparent 40%),var(--cream)}.login-card{width:min(430px,100%);background:#fff;padding:42px;border-radius:26px;box-shadow:var(--shadow)}.brand-mark{width:54px;height:54px;border-radius:17px;display:grid;place-items:center;background:var(--green);color:#fff;font-size:28px;font-weight:800;margin-bottom:26px}.brand-mark.small{width:40px;height:40px;border-radius:13px;font-size:20px;margin:0}.eyebrow{text-transform:uppercase;letter-spacing:.14em;font-size:11px;font-weight:800;color:var(--green);margin:0 0 7px}h1,h2,h3{margin:0 0 10px;line-height:1.15}h1{font-size:34px}h2{font-size:27px}h3{font-size:19px}.muted,.hint{color:var(--muted)}.hint{font-size:12px;line-height:1.5}.stack{display:grid;gap:15px}.login-card .stack{margin-top:24px}label{display:grid;gap:7px;font-size:13px;font-weight:700;color:#3e5750}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:11px;background:#fff;padding:11px 12px;color:var(--ink);outline:none}input:focus,select:focus,textarea:focus{border-color:#69a491;box-shadow:0 0 0 3px rgba(50,121,99,.12)}.btn{border:0;border-radius:11px;padding:11px 16px;font-weight:800;cursor:pointer}.btn.primary{background:var(--green);color:#fff}.btn.secondary{background:var(--green2);color:var(--green)}.btn:disabled{opacity:.55;cursor:wait}.app{min-height:100vh;display:grid;grid-template-columns:245px 1fr}.sidebar{position:sticky;top:0;height:100vh;background:#153c33;color:#fff;padding:24px 18px;display:flex;flex pse;font-size:13px}th{position:sticky;top:0;background:#eef5f1;color:#49625a;text-align:left;padding:10px 11px;white-space:nowrap}td{padding:10px 11px;border-top:1px solid var(--line);vertical-align:top}tr:hover td{background:#fbfcfb}.num{text-align:right;font-variant-numeric:tabular-nums}.badge{display:inline-flex;padding:4px 7px;border-radius:999px;font-size:10px;font-weight:800;background:#edf2f0;color:#526a63}.badge.ok{background:#dff0e7;color:#247154}.badge.warn{background:#f8ead2;color:#8e5b0e}.badge.bad{background:#f6dddd;color:#9a3835}.dropzone{border:1px dashed #8daf9f;border-radius:14px;padding:26px;text-align:center;background:#f3f8f5;cursor:pointer}.dropzone input{display:none}.narrative{background:#eef5f1;border-left:4px solid var(--green);padding:16px 18px;border-radius:12px}.narrative p{margin:5px 0;line-height:1.5}.source-list{display:flex;gap:8px;flex-wrap:wrap}.source-list span{background:#fff;border:1px solid var(--line);padding:7px 10px;border-radius:999px;font-size:11px}.toast{position:fixed;right:22px;top:22px;z-index:100;background:#173f35;color:#fff;padding:13px 17px;border-radius:11px;box-shadow:var(--shadow);transform:translateY(-100px);opacity:0;transition:.25s}.toast.show{transform:translateY(0);opacity:1}.toast.error{background:#9b3e3a}code{background:#edf2f0;padding:2px 5px;border-radius:5px}@media(max-width:1000px){.cards{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.app{grid-template-columns:200px 1fr}main{padding:24px}}@media(max-width:720px){.app{display:block}.sidebar{position:relative;height:auto}.sidebar nav{grid-template-columns:repeat(2,1fr)}.sidebar-user{margin-top:16px}.topbar{margin-top:10px}.cards{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}main{padding:18px}.status-pill{display:none}}
