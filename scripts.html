<script>
  let authToken = '';
  let currentUser = null;

  function printOutput(obj) {
    document.getElementById('output').textContent = JSON.stringify(obj, null, 2);
  }

  function onLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    google.script.run.withSuccessHandler((res) => {
      if (!res.ok) {
        document.getElementById('loginMsg').textContent = res.message || 'Error de acceso';
        return;
      }
      authToken = res.token;
      currentUser = res.user;
      document.getElementById('loginCard').classList.add('hidden');
      document.getElementById('appCard').classList.remove('hidden');
      printOutput({ login: 'ok', user: currentUser });
    }).login({ username, password });
  }

  function doLogout() {
    google.script.run.withSuccessHandler(() => {
      authToken = '';
      currentUser = null;
      document.getElementById('appCard').classList.add('hidden');
      document.getElementById('loginCard').classList.remove('hidden');
    }).logout(authToken);
  }

  function saveInventory() {
    const payload = {
      idProducto: document.getElementById('invProducto').value,
      cantidadFisica: document.getElementById('invCantidad').value,
      unidad: document.getElementById('invUnidad').value,
      sede: currentUser?.sede || 'SEDE-SA'
    };
    google.script.run.withSuccessHandler(printOutput).registerInventoryPhysical(payload, authToken);
  }

  function importFudoRows() {
    try {
      const rows = JSON.parse(document.getElementById('fudoRows').value || '[]');
      google.script.run.withSuccessHandler(printOutput).importFudoProductsRows({
        nombreArchivo: 'import_manual_web',
        rows,
        sede: currentUser?.sede || 'SEDE-SA'
      }, authToken);
    } catch (e) {
      printOutput({ ok: false, error: 'JSON inválido para Fudo rows.' });
    }
  }

  function runAudit() {
    google.script.run.withSuccessHandler(printOutput).runInventoryAudit({
      sede: currentUser?.sede || 'SEDE-SA'
    }, authToken);
  }

  function sendReport() {
    const mail = prompt('Correos separados por coma:');
    if (!mail) return;
    const recipients = mail.split(',').map(v => v.trim()).filter(Boolean);
    google.script.run.withSuccessHandler(printOutput).sendDailyEmailReport({
      recipients,
      sede: currentUser?.sede || 'SEDE-SA'
    }, authToken);
  }
</script>
