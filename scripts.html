<script>
const state={token:localStorage.getItem('amelia_token')||'',boot:null,dashboard:null,countInventory:[]};
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const fmt=(v,d=2)=>v===null||v===undefined?'—':Number(v).toLocaleString('es-CO',{maximumFractionDigits:d});
function call(action,payload={},token=state.token){return new Promise((resolve,reject)=>google.script.run.withSuccessHandler(r=>r&&r.ok?resolve(r.data):reject(new Error(r?.error||'Error desconocido'))).withFailureHandler(reject).api({action,token,payload}));}
function toast(message,error=false){const t=$('#toast');t.textContent=message;t.className='toast show'+(error?' error':'');setTimeout(()=>t.className='toast',3800);}
function busy(btn,on,text){if(!btn)return;btn.disabled=on;if(on){btn.dataset.label=btn.textContent;btn.textContent=text||'Procesando...';}else btn.textContent=btn.dataset.label||btn.textContent;}
function today(){const d=new Date(),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`}
function table(headers,rows){return `<div class="table-wrap"><table><thead><tr>${headers.map(h=>`<th>${esc(h.label)}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.map(r=>`<tr>${headers.map(h=>`<td class="${h.num?'num':''}">${h.render?h.render(r):esc(r[h.key])}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${headers.length}">Sin datos</td></tr>`}</tbody></table></div>`}
function options(rows,value='locationId',label='name'){return rows.map(r=>`<option value="${esc(r[value])}">${esc(r[label])}</option>`).join('')}

async function init(){
  ['countDate','movementDate','transferDate','productionDate','importDate','analysisDate'].forEach(id=>$('#'+id).value=today());
  bindEvents();
  try{let auth=null;if(state.token)auth={token:state.token};else auth=await call('autoLogin',{},'');if(auth?.token){state.token=auth.token;localStorage.setItem('amelia_token',state.token);await loadApp();}}
  catch(e){localStorage.removeItem('amelia_token');state.token='';}
}
async function loadApp(){state.boot=await call('bootstrap');$('#loginView').classList.add('hidden');$('#appView').classList.remove('hidden');$('#userName').textContent=state.boot.user.name;$('#userRole').textContent=state.boot.user.role;
  $$('[data-admin]').forEach(el=>el.style.display=state.boot.user.role==='ADMIN'?'':'none');
  const locOpts=options(state.boot.locations);['dashLocation','countLocation','movementLocation','transferFrom','transferTo','productionLocation','analysisLocation'].forEach(id=>$('#'+id).innerHTML=locOpts);
  $('#importLocation').insertAdjacentHTML('beforeend',locOpts);$('#newUserLocations').innerHTML=locOpts;
  const itemOpts=options(state.boot.items,'itemId','name');['movementItem','transferItem'].forEach(id=>$('#'+id).innerHTML=itemOpts);
  $('#recipeOutputItem').innerHTML=itemOpts;
  $('#productionRecipe').innerHTML=options(state.boot.productionRecipes,'recipeId','name');renderImports();await loadDashboard();
  refreshAliasOptions();if(!$('#recipeLines').children.length)addRecipeLine();
}
function bindEvents(){
  $('#loginForm').addEventListener('submit',async e=>{e.preventDefault();const b=e.submitter;busy(b,true,'Ingresando...');try{const r=await call('login',{email:$('#loginEmail').value,pin:$('#loginPin').value},'');state.token=r.token;localStorage.setItem('amelia_token',r.token);await loadApp();}catch(err){toast(err.message,true)}finally{busy(b,false)}});
  $('#logoutBtn').onclick=async()=>{try{await call('logout')}catch(e){}localStorage.removeItem('amelia_token');location.reload()};
  $$('#nav button').forEach(btn=>btn.onclick=()=>showView(btn.dataset.view,btn));
  $('#refreshDashboard').onclick=loadDashboard;$('#dashLocation').onchange=loadDashboard;
  $('#countSearch').oninput=renderCountTable;$('#countLocation').onchange=loadCountInventory;$('#saveCount').onclick=saveCount;
  $('#movementForm').onsubmit=saveMovement;$('#transferForm').onsubmit=saveTransfer;$('#productionForm').onsubmit=saveProduction;
  $('#itemForm').onsubmit=saveItem;$('#recipeForm').onsubmit=saveRecipe;$('#aliasForm').onsubmit=saveAlias;$('#aliasType').onchange=refreshAliasOptions;
  $('#recipeType').onchange=()=>$('#productionOutputFields').classList.toggle('hidden',$('#recipeType').value!=='PRODUCTION');$('#addRecipeLine').onclick=addRecipeLine;
  $('#importFile').onchange=e=>$('#fileLabel').textContent=e.target.files[0]?.name||'Seleccionar archivo';$('#importForm').onsubmit=uploadImport;
  $('#runAnalysis').onclick=runAnalysis;$('#userForm').onsubmit=saveUser;
}
function showView(name,btn){$$('.view').forEach(v=>v.classList.remove('active'));$('#view-'+name).classList.add('active');$$('#nav button').forEach(b=>b.classList.remove('active'));btn?.classList.add('active');
  const titles={dashboard:'Resumen',inventory:'Conteo físico',movements:'Movimientos',production:'Producción',catalog:'Catálogo y recetas',imports:'Importar FUDO',analysis:'Análisis diario',users:'Usuarios'};$('#pageTitle').textContent=titles[name]||name;
  if(name==='inventory')loadCountInventory();if(name==='users')loadUsers();
}
async function loadDashboard(){try{state.dashboard=await call('dashboard',{locationId:$('#dashLocation').value});renderDashboard();}catch(e){toast(e.message,true)}}
function renderDashboard(){const d=state.dashboard;$('#dashboardCards').innerHTML=[['Alertas abiertas',d.openAlerts,'Requieren revisión'],['Stocks negativos',d.negativeCount,'Producción o conteo faltante'],['Bajo mínimo',d.lowCount,'Reponer pronto'],['Recetas disponibles',d.availability.length,'Calculadas por sede']].map(c=>`<div class="card"><small>${c[0]}</small><strong>${fmt(c[1],0)}</strong><small>${c[2]}</small></div>`).join('');
  $('#availabilityTable').innerHTML=table([{label:'Plato',key:'name'},{label:'Alcanza',num:true,render:r=>`<strong>${fmt(r.available,0)}</strong>`},{label:'Limita',key:'limiting'}],d.availability);
  const visible=d.inventory.filter(i=>i.stock!==0).sort((a,b)=>a.category.localeCompare(b.category)||a.name.localeCompare(b.name));$('#stockTable').innerHTML=table([{label:'Insumo',key:'name'},{label:'Categoría',key:'category'},{label:'Stock',num:true,render:r=>`${fmt(r.stock,3)} ${esc(r.unit)}`}],visible);
}
async function loadCountInventory(){if(!state.boot)return;try{const d=await call('dashboard',{locationId:$('#countLocation').value});state.countInventory=d.inventory||[];renderCountTable();}catch(e){toast(e.message,true)}}
function renderCountTable(){if(!state.boot)return;const q=($('#countSearch').value||'').toLowerCase();const current=state.countInventory.reduce((a,i)=>(a[i.itemId]=i.stock,a),{});const rows=state.boot.items.filter(i=>(i.name+' '+i.category).toLowerCase().includes(q));
  $('#countTable').innerHTML=table([{label:'Insumo',render:r=>`<strong>${esc(r.name)}</strong><br><small>${esc(r.category)}</small>`},{label:'Sistema',num:true,render:r=>`${fmt(current[r.itemId]||0,3)} ${esc(r.baseUnit)}`},{label:'Conteo físico',render:r=>`<input class="count-input" data-item="${esc(r.itemId)}" type="number" step="any" placeholder="No contado">`},{label:'Unidad',key:'baseUnit'}],rows);
}
async function saveCount(){const b=$('#saveCount');const rows=$$('.count-input').filter(i=>i.value!=='').map(i=>({itemId:i.dataset.item,qty:i.value}));if(!rows.length)return toast('Ingresa al menos un conteo.',true);busy(b,true,'Guardando...');try{const r=await call('saveCount',{locationId:$('#countLocation').value,countDate:$('#countDate').value,rows});toast(`Conteo guardado: ${r.rows} insumos, ${r.adjustments} ajustes.`);$('#dashLocation').value=$('#countLocation').value;await Promise.all([loadDashboard(),loadCountInventory()]);}catch(e){toast(e.message,true)}finally{busy(b,false)}}
async function saveMovement(e){e.preventDefault();const b=e.submitter;busy(b,true);try{await call('saveMovement',{type:$('#movementType').value,locationId:$('#movementLocation').value,itemId:$('#movementItem').value,qty:$('#movementQty').value,date:$('#movementDate').value,provider:$('#movementProvider').value,documentNo:$('#movementDocument').value,unitCost:$('#movementUnitCost').value,reason:$('#movementReason').value});toast('Movimiento registrado.');e.target.reset();$('#movementDate').value=today();await loadDashboard();}catch(err){toast(err.message,true)}finally{busy(b,false)}}
async function saveTransfer(e){e.preventDefault();const b=e.submitter;busy(b,true);try{await call('saveTransfer',{fromLocationId:$('#transferFrom').value,toLocationId:$('#transferTo').value,itemId:$('#transferItem').value,qty:$('#transferQty').value,date:$('#transferDate').value,reason:$('#transferReason').value});toast('Traslado registrado en ambas sedes.');e.target.reset();$('#transferDate').value=today();await loadDashboard();}catch(err){toast(err.message,true)}finally{busy(b,false)}}
async function saveProduction(e){e.preventDefault();const b=e.submitter;busy(b,true);try{await call('saveProduction',{locationId:$('#productionLocation').value,recipeId:$('#productionRecipe').value,outputQty:$('#productionQty').value,date:$('#productionDate').value,notes:$('#productionNotes').value});toast('Producción registrada con consumo de insumos.');e.target.reset();$('#productionDate').value=today();await loadDashboard();}catch(err){toast(err.message,true)}finally{busy(b,false)}}
function refreshAliasOptions(){if(!state.boot)return;const type=$('#aliasType').value;const rows=type==='ITEM'?state.boot.items:state.boot.recipes;$('#aliasEntity').innerHTML=options(rows,type==='ITEM'?'itemId':'recipeId','name')}
function addRecipeLine(){const div=document.createElement('div');div.className='recipe-line';div.innerHTML=`<label>Ingrediente<select class="recipe-item">${options(state.boot.items,'itemId','name')}</select></label><label>Cantidad<input class="recipe-qty" type="number" step="any" required></label><button class="btn secondary" type="button">Quitar</button>`;div.querySelector('button').onclick=()=>div.remove();$('#recipeLines').appendChild(div)}
async function refreshBoot(){state.boot=await call('bootstrap');const itemOpts=options(state.boot.items,'itemId','name');['movementItem','transferItem','recipeOutputItem'].forEach(id=>$('#'+id).innerHTML=itemOpts);$('#productionRecipe').innerHTML=options(state.boot.productionRecipes,'recipeId','name');refreshAliasOptions();renderImports()}
async function saveItem(e){e.preventDefault();const b=e.submitter;busy(b,true);try{await call('saveItem',{name:$('#itemName').value,category:$('#itemCategory').value,baseUnit:$('#itemUnit').value,minimumStock:$('#itemMinimum').value,notes:$('#itemNotes').value,active:true});toast('Insumo creado.');e.target.reset();await refreshBoot();}catch(err){toast(err.message,true)}finally{busy(b,false)}}
async function saveRecipe(e){e.preventDefault();const b=e.submitter;const lines=$$('.recipe-line').map(r=>({itemId:r.querySelector('.recipe-item').value,qty:r.querySelector('.recipe-qty').value}));busy(b,true);try{await call('saveRecipe',{name:$('#recipeName').value,type:$('#recipeType').value,outputItemId:$('#recipeType').value==='PRODUCTION'?$('#recipeOutputItem').value:'',outputQty:$('#recipeType').value==='PRODUCTION'?$('#recipeOutputQty').value:1,outputUnit:$('#recipeType').value==='PRODUCTION'?state.boot.items.find(i=>i.itemId===$('#recipeOutputItem').value)?.baseUnit:'u',notes:$('#recipeNotes').value,lines});toast('Receta guardada.');e.target.reset();$('#recipeLines').innerHTML='';addRecipeLine();$('#productionOutputFields').classList.add('hidden');await refreshBoot();}catch(err){toast(err.message,true)}finally{busy(b,false)}}
async function saveAlias(e){e.preventDefault();const b=e.submitter;busy(b,true);try{await call('saveAlias',{externalName:$('#aliasExternal').value,entityType:$('#aliasType').value,entityId:$('#aliasEntity').value});toast('Equivalencia FUDO guardada.');e.target.reset();refreshAliasOptions();}catch(err){toast(err.message,true)}finally{busy(b,false)}}
async function uploadImport(e){e.preventDefault();const b=e.submitter,file=$('#importFile').files[0];if(!file)return toast('Selecciona un archivo.',true);if(file.size>10*1024*1024)return toast('El archivo supera 10 MB.',true);busy(b,true,'Cargando...');try{const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)});const result=await call('uploadReport',{fileName:file.name,mimeType:file.type,dataUrl,sourceType:$('#importType').value,reportDate:$('#importDate').value,defaultLocationId:$('#importLocation').value});toast(`Archivo ${result.status}: ${result.rowsImported||0} filas importadas.`);state.boot=await call('bootstrap');renderImports();await loadDashboard();}catch(err){toast(err.message,true)}finally{busy(b,false)}}
function renderImports(){const rows=state.boot?.imports||[];$('#importsTable').innerHTML=table([{label:'Fecha',key:'reportDate'},{label:'Archivo',key:'fileName'},{label:'Tipo',key:'sourceType'},{label:'Estado',render:r=>`<span class="badge ${r.status==='PROCESSED'?'ok':r.status==='ERROR'?'bad':'warn'}">${esc(r.status)}</span>`},{label:'Importadas',num:true,key:'rowsImported'}],rows)}
async function runAnalysis(){const b=$('#runAnalysis');busy(b,true,'Analizando...');try{const a=await call('analysis',{date:$('#analysisDate').value,locationId:$('#analysisLocation').value});const status={MATCH:['Coincide','ok'],ENTRY_REQUIRED:['Entrada requerida','warn'],EXTRA_USE:['Consumo extra','bad'],MISSING_OPENING:['Sin apertura','warn'],MISSING_CLOSING:['Sin cierre','warn']};
  $('#analysisOutput').innerHTML=`<article class="narrative">${a.narrative.map(p=>`<p>${esc(p)}</p>`).join('')}</article><div class="source-list">${a.sources.map(s=>`<span><strong>${esc(s.name)}:</strong> ${esc(s.source)}</span>`).join('')}</div><article class="panel"><div class="panel-head"><div><p class="eyebrow">Ventas</p><h3>Productos registrados</h3></div></div>${table([{label:'Producto',key:'name'},{label:'Cantidad',num:true,key:'qty'}],a.products)}</article><article class="panel"><div class="panel-head"><div><p class="eyebrow">Equivalente teórico</p><h3>Insumos base exigidos por las ventas</h3></div></div>${table([{label:'Insumo',key:'name'},{label:'Consumo',num:true,render:r=>`${fmt(r.qty,3)} ${esc(r.unit)}`},{label:'Fuente',key:'source'}],a.rawEquivalent||[])}</article><article class="panel"><div class="panel-head"><div><p class="eyebrow">Conciliación por etapa</p><h3>Apertura + movimientos − consumo directo = cierre esperado</h3></div></div>${table([{label:'Insumo',key:'name'},{label:'Apertura',num:true,render:r=>fmt(r.opening,3)},{label:'Movimientos',num:true,render:r=>fmt(r.knownMovements,3)},{label:'Consumo esperado',num:true,render:r=>fmt(r.expectedConsumption,3)},{label:'Cierre esperado',num:true,render:r=>fmt(r.projectedClosing,3)},{label:'Cierre físico',num:true,render:r=>fmt(r.physicalClosing,3)},{label:'Diferencia',num:true,render:r=>fmt(r.difference,3)},{label:'Resultado',render:r=>`<span class="badge ${status[r.status]?.[1]||''}">${status[r.status]?.[0]||r.status}</span>`}],a.rows)}</article>`;
  }catch(e){toast(e.message,true)}finally{busy(b,false)}}
async function loadUsers(){if(state.boot.user.role!=='ADMIN')return;try{const rows=await call('listUsers');$('#usersTable').innerHTML=table([{label:'Nombre',key:'name'},{label:'Correo',key:'email'},{label:'Rol',key:'role'},{label:'Sedes',render:r=>esc((r.locations||[]).join(', '))}],rows)}catch(e){toast(e.message,true)}}
async function saveUser(e){e.preventDefault();const b=e.submitter;busy(b,true);try{const locations=Array.from($('#newUserLocations').selectedOptions).map(o=>o.value);await call('saveUser',{name:$('#newUserName').value,email:$('#newUserEmail').value,role:$('#newUserRole').value,pin:$('#newUserPin').value,locations,active:true});toast('Usuario creado.');e.target.reset();await loadUsers();}catch(err){toast(err.message,true)}finally{busy(b,false)}}
document.addEventListener('DOMContentLoaded',init);
</script>
