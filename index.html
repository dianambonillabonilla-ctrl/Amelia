<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('styles'); ?>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Dilana OS - Amelia</h1>
        <p class="subtitle">Control operativo, inventario auditado y Fudo</p>
      </header>

      <section id="loginCard" class="card">
        <h2>Iniciar sesión</h2>
        <div class="form-grid">
          <label>Usuario</label>
          <input id="username" type="text" placeholder="usuario">
          <label>Contraseña</label>
          <input id="password" type="password" placeholder="contraseña">
          <button onclick="onLogin()">Entrar</button>
        </div>
        <p id="loginMsg"></p>
      </section>

      <section id="appCard" class="card hidden">
        <h2>Panel rápido</h2>
        <div class="toolbar">
          <button onclick="runAudit()">Ejecutar auditoría</button>
          <button onclick="sendReport()">Enviar reporte correo</button>
          <button onclick="doLogout()">Salir</button>
        </div>

        <div class="block">
          <h3>Importación Fudo (manual)</h3>
          <p>Pega JSON de filas desde Reporte-Productos/Detalle.</p>
          <textarea id="fudoRows" rows="6" placeholder='[{"fecha":"2026-07-10","producto":"Chanchostilla","cantidadVendida":10}]'></textarea>
          <button onclick="importFudoRows()">Importar y calcular consumo teórico</button>
        </div>

        <div class="block">
          <h3>Inventario físico rápido</h3>
          <div class="form-grid">
            <label>ID Producto</label><input id="invProducto" type="text" placeholder="PROD-XXXX">
            <label>Cantidad</label><input id="invCantidad" type="number" step="0.01" placeholder="0">
            <label>Unidad</label><input id="invUnidad" type="text" value="g">
            <button onclick="saveInventory()">Guardar conteo</button>
          </div>
        </div>

        <pre id="output"></pre>
      </section>
    </div>
    <?!= include('scripts'); ?>
  </body>
</html>
