<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilana OS — Iniciar sesión</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <div class="marca"><h1>Dilana <span>OS</span></h1></div>
    <form id="form-login">
      <div class="campo">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" required autocomplete="username">
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button class="btn" type="submit" style="width:100%">Entrar</button>
      <p class="error-msg" id="error" style="display:none"></p>
    </form>
  </div>
</div>

<script src="assets/config.js"></script>
<script>
document.getElementById('form-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  const usuario = document.getElementById('usuario').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  errorEl.style.display = 'none';

  const data = await llamar('login', { usuario, password });
  if (data.ok) {
    Sesion.guardar(data.token, data.usuario);
    window.location.href = 'dashboard.html';
  } else {
    errorEl.textContent = data.error || 'No se pudo iniciar sesión';
    errorEl.style.display = 'block';
  }
});
</script>
</body>
</html>
