<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilana OS — Cambiar contraseña</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <div class="marca"><h1>Dilana <span>OS</span></h1></div>
    <h2 style="text-align:center; margin-bottom:18px">Cambiar mi contraseña</h2>
    <form id="form-password">
      <div class="campo">
        <label for="actual">Contraseña actual</label>
        <input type="password" id="actual" required autocomplete="current-password">
      </div>
      <div class="campo">
        <label for="nueva">Contraseña nueva</label>
        <input type="password" id="nueva" required autocomplete="new-password" minlength="6">
      </div>
      <div class="campo">
        <label for="confirmar">Repetir contraseña nueva</label>
        <input type="password" id="confirmar" required autocomplete="new-password" minlength="6">
      </div>
      <button class="btn" type="submit" style="width:100%">Guardar</button>
      <p class="error-msg" id="error" style="display:none"></p>
      <p style="text-align:center; margin-top:14px"><a href="dashboard.html" style="font-size:.85rem; color:var(--grey)">Volver</a></p>
    </form>
  </div>
</div>

<script src="assets/config.js"></script>
<script>
Sesion.requerir();

document.getElementById('form-password').addEventListener('submit', async (e) => {
  e.preventDefault();
  const actual = document.getElementById('actual').value;
  const nueva = document.getElementById('nueva').value;
  const confirmar = document.getElementById('confirmar').value;
  const errorEl = document.getElementById('error');
  errorEl.style.display = 'none';

  if (nueva !== confirmar) {
    errorEl.textContent = 'La nueva contraseña no coincide con la confirmación.';
    errorEl.style.display = 'block';
    return;
  }

  const data = await llamar('cambiar_password', { password_actual: actual, password_nueva: nueva });
  if (data.ok) {
    alert('Contraseña actualizada.');
    window.location.href = 'dashboard.html';
  } else {
    errorEl.textContent = data.error || 'No se pudo cambiar la contraseña';
    errorEl.style.display = 'block';
  }
});
</script>
</body>
</html>
