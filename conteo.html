<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilana OS — Registrar conteo</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="marca">Dilana <span>OS</span></div>
    <nav>
      <a href="dashboard.html">Disponible Hoy</a>
      <a href="conteo.html" class="activo">Registrar conteo</a>
      <a href="producir.html">Registrar producción</a>
      <a href="catalogo.html">Registrar producto</a>
      <a href="traslados.html">Traslados</a>
      <a href="importar.html">Importar de FUDO</a>
      <a href="conciliacion.html">Conciliación</a>
      <a href="usuarios.html">Usuarios</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>Registrar conteo de cierre</h1>
      <div id="barra-usuario"></div>
    </div>

    <div class="card">
      <div class="grid grid-3" style="margin-bottom:18px">
        <div class="campo">
          <label>Fecha</label>
          <input type="date" id="fecha">
        </div>
        <div class="campo">
          <label>Sede</label>
          <select id="sede">
            <option>San Antonio</option>
            <option>Capri</option>
            <option>Centro de Producción</option>
          </select>
        </div>
        <div class="campo">
          <label>Punto de conteo</label>
          <select id="punto"></select>
        </div>
      </div>

      <p id="info-anterior" style="color:var(--grey); font-size:.85rem; margin:0 0 12px"></p>
      <table>
        <thead><tr><th>Producto</th><th>Unidad</th><th>Conteo anterior</th><th>Cantidad de hoy</th><th></th></tr></thead>
        <tbody id="filas"></tbody>
      </table>
      <datalist id="lista-productos"></datalist>
      <button class="btn fantasma" id="btn-agregar-fila" style="margin-top:10px">+ Agregar producto</button>

      <div style="margin-top:20px">
        <button class="btn dorado" id="btn-guardar">Guardar conteo</button>
      </div>
    </div>
  </main>
</div>

<script src="assets/config.js"></script>
<script>
Sesion.requerir();
montarBarraUsuario();
document.getElementById('fecha').valueAsDate = new Date();

// Los puntos de conteo dependen de la sede elegida (cada sede tiene sus propias áreas).
// PUNTOS_POR_SEDE vive en assets/config.js (compartido con traslados.html).
function poblarPuntos_() {
  const sede = document.getElementById('sede').value;
  const select = document.getElementById('punto');
  const anterior = select.value;
  const opciones = PUNTOS_POR_SEDE[sede] || [];
  select.innerHTML = opciones.map(p => `<option>${escapeHtml(p)}</option>`).join('');
  if (opciones.includes(anterior)) select.value = anterior;
}

// Sugiere nombres ya existentes en el catálogo maestro (vía <datalist>) para que el conteo no
// dependa de que cada quien teclee el nombre exacto — reduce productos "duplicados" por typo.
async function cargarSugerenciasProductos_() {
  const data = await llamar('catalogo_listar');
  if (!data.ok) return;
  document.getElementById('lista-productos').innerHTML = data.data
    .map(p => `<option value="${escapeHtml(p.nombre_estandar)}">`).join('');
}
cargarSugerenciasProductos_();

function nuevaFila(producto = '', unidad = 'g', anterior = null) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="text" class="in-producto" list="lista-productos" value="${escapeHtml(producto)}" placeholder="ej. Costilla Preparada"></td>
    <td><select class="in-unidad">
        <option ${unidad==='g'?'selected':''}>g</option>
        <option ${unidad==='kg'?'selected':''}>kg</option>
        <option ${unidad==='u'?'selected':''}>u</option>
        <option ${unidad==='ml'?'selected':''}>ml</option>
        <option ${unidad==='l'?'selected':''}>l</option>
      </select></td>
    <td style="color:var(--grey)">${anterior === null ? '—' : escapeHtml(anterior)}</td>
    <td><input type="number" step="0.01" class="in-cantidad" placeholder="${anterior === null ? '' : 'ej. ' + escapeHtml(anterior)}"></td>
    <td><button class="btn fantasma btn-quitar" type="button">Quitar</button></td>`;
  tr.querySelector('.btn-quitar').addEventListener('click', () => tr.remove());
  document.getElementById('filas').appendChild(tr);
}

// Convierte lo que venga en r.fecha (string "yyyy-MM-dd" o fecha/hora ISO completa, según cómo
// Sheets haya guardado la celda) a solo la parte de fecha, para poder comparar y agrupar por día.
function fechaSolo_(valor) {
  if (!valor) return '';
  const texto = String(valor);
  if (/^\d{4}-\d{2}-\d{2}/.test(texto)) return texto.slice(0, 10);
  const d = new Date(valor);
  return isNaN(d) ? texto : d.toISOString().slice(0, 10);
}

// Precarga la tabla con los productos del ÚLTIMO conteo guardado para esta sede + punto de
// conteo, mostrando esa cantidad anterior como referencia y dejando la casilla de hoy vacía —
// así el personal no tiene que volver a escribir/buscar cada producto desde cero cada vez.
async function cargarConteoAnterior_() {
  const sede = document.getElementById('sede').value;
  const punto = document.getElementById('punto').value;
  const info = document.getElementById('info-anterior');
  document.getElementById('filas').innerHTML = '';
  info.textContent = 'Cargando conteo anterior…';

  const data = await llamar('conteo_listar', { sede });
  if (!data.ok) {
    info.textContent = '';
    for (let i = 0; i < 4; i++) nuevaFila();
    return;
  }

  const delPunto = data.data.filter(r => r.punto_conteo === punto);
  if (!delPunto.length) {
    info.textContent = 'Sin conteos previos para este punto todavía — agrega los productos manualmente.';
    for (let i = 0; i < 4; i++) nuevaFila();
    return;
  }

  const fechaMax = delPunto.reduce((max, r) => {
    const f = fechaSolo_(r.fecha);
    return f > max ? f : max;
  }, '');

  const porProducto = {};
  delPunto
    .filter(r => fechaSolo_(r.fecha) === fechaMax)
    .forEach(r => { porProducto[r.producto] = r; });

  const productos = Object.values(porProducto).sort((a, b) => a.producto.localeCompare(b.producto));
  info.textContent = `Productos del último conteo de este punto (${fechaMax}) — actualiza la cantidad de hoy, quita lo que no aplique o agrega productos nuevos.`;
  productos.forEach(r => nuevaFila(r.producto, r.unidad, r.cantidad));
}

document.getElementById('btn-agregar-fila').addEventListener('click', () => nuevaFila());
document.getElementById('sede').addEventListener('change', () => { poblarPuntos_(); cargarConteoAnterior_(); });
document.getElementById('punto').addEventListener('change', cargarConteoAnterior_);
poblarPuntos_();
cargarConteoAnterior_();

document.getElementById('btn-guardar').addEventListener('click', async () => {
  const fecha = document.getElementById('fecha').value;
  const sede = document.getElementById('sede').value;
  const punto = document.getElementById('punto').value;

  const items = Array.from(document.getElementById('filas').children)
    .map(tr => ({
      fecha, sede, punto_conteo: punto,
      producto: tr.querySelector('.in-producto').value.trim(),
      unidad: tr.querySelector('.in-unidad').value,
      cantidad: parseFloat(tr.querySelector('.in-cantidad').value.replace(',', '.'))
    }))
    .filter(it => it.producto && !isNaN(it.cantidad));

  if (!items.length) { alert('Agrega al menos un producto con cantidad.'); return; }

  const data = await llamar('conteo_registrar', { items });
  if (data.ok) {
    avisarGuardado(`Guardado: ${data.registrados} productos.`);
  } else {
    alert(data.error);
  }
});
</script>
</body>
</html>
