<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilana OS — Usuarios</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="marca">Dilana <span>OS</span></div>
    <nav>
      <a href="dashboard.html">Disponible Hoy</a>
      <a href="conteo.html" data-solo-rol="Administrador,Encargado,Cocina">Registrar conteo</a>
      <a href="producir.html" data-solo-rol="Administrador,Encargado,Cocina">Registrar producción</a>
      <a href="recetas.html" data-solo-rol="Administrador">Recetas</a>
      <a href="catalogo.html" data-solo-rol="Administrador,Encargado,Cocina">Registrar producto</a>
      <a href="traslados.html" data-solo-rol="Administrador,Encargado,Cocina">Traslados</a>
      <a href="compras.html" data-solo-rol="Administrador,Encargado,Cocina">Compras</a>
      <a href="importar.html" data-solo-rol="Administrador">Importar de FUDO</a>
      <a href="conciliacion.html" data-solo-rol="Administrador,Encargado,Lectura">Conciliación</a>
      <a href="diagnostico.html" data-solo-rol="Administrador">Diagnóstico</a>
      <a href="usuarios.html" class="activo" data-solo-rol="Administrador">Usuarios</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>Usuarios y roles</h1>
      <div id="barra-usuario"></div>
    </div>

    <div class="card">
      <h2>Crear usuario</h2>
      <div class="grid grid-4">
        <div class="campo"><label>Nombre</label><input type="text" id="nuevo-nombre"></div>
        <div class="campo"><label>Usuario de acceso</label><input type="text" id="nuevo-usuario"></div>
        <div class="campo"><label>Rol</label>
          <select id="nuevo-rol">
            <option>Administrador</option>
            <option>Encargado</option>
            <option>Cocina</option>
            <option>Lectura</option>
          </select>
        </div>
        <div class="campo"><label>Sede</label>
          <select id="nuevo-sede">
            <option>Ambas</option>
            <option>San Antonio</option>
            <option>Capri</option>
            <option>Centro de Producción</option>
          </select>
        </div>
      </div>
      <div class="grid grid-3">
        <div class="campo"><label>Contraseña inicial</label><input type="password" id="nuevo-password" minlength="8" placeholder="mínimo 8 caracteres"></div>
        <div class="campo"><label>Correo (para alertas de stock bajo)</label><input type="email" id="nuevo-email" placeholder="opcional, solo Administrador/Encargado reciben alertas"></div>
      </div>
      <button class="btn dorado" id="btn-crear">Crear usuario</button>
    </div>

    <div class="card">
      <h2>Equipo actual</h2>
      <table>
        <thead><tr><th>Nombre</th><th>Usuario</th><th>Rol</th><th>Sede</th><th>Correo</th><th>Estado</th><th></th></tr></thead>
        <tbody id="tabla-usuarios"><tr><td colspan="6" class="vacio">Cargando…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<script src="assets/config.js"></script>
<script>
Sesion.requerir();
requerirRol_(['Administrador']);
montarBarraUsuario();

async function cargar() {
  const data = await llamar('usuarios_listar');
  const body = document.getElementById('tabla-usuarios');
  if (!data.ok) { body.innerHTML = `<tr><td colspan="7" class="vacio">${escapeHtml(data.error)}</td></tr>`; return; }
  body.innerHTML = data.data.map(u => `
    <tr>
      <td>${escapeHtml(u.nombre)}</td><td>${escapeHtml(u.usuario)}</td><td>${escapeHtml(u.rol)}</td><td>${escapeHtml(u.sede)}</td>
      <td>${escapeHtml(u.email || '—')}</td>
      <td>${u.activo ? '<span class="badge ok">Activo</span>' : '<span class="badge alerta">Inactivo</span>'}</td>
      <td>
        <button class="btn fantasma btn-toggle" data-id="${escapeHtml(u.id)}" data-activo="${u.activo}">${u.activo ? 'Desactivar' : 'Activar'}</button>
        <button class="btn fantasma btn-resetear" data-id="${escapeHtml(u.id)}" data-nombre="${escapeHtml(u.nombre)}">Restablecer contraseña</button>
      </td>
    </tr>`).join('');

  document.querySelectorAll('.btn-toggle').forEach(btn => {
    btn.addEventListener('click', async () => {
      await llamar('usuarios_guardar', { item: { id: btn.dataset.id, activo: btn.dataset.activo !== 'true' } });
      cargar();
    });
  });

  document.querySelectorAll('.btn-resetear').forEach(btn => {
    btn.addEventListener('click', async () => {
      const nueva = prompt(`Nueva contraseña para ${btn.dataset.nombre} (mínimo 8 caracteres). No hace falta la contraseña anterior.`);
      if (!nueva) return;
      const data = await llamar('usuario_resetear_password', { id: btn.dataset.id, password_nueva: nueva });
      if (data.ok) {
        avisarGuardado(`Contraseña de ${btn.dataset.nombre} restablecida.`);
      } else {
        alert(data.error);
      }
    });
  });
}

document.getElementById('btn-crear').addEventListener('click', async () => {
  const item = {
    nombre: document.getElementById('nuevo-nombre').value.trim(),
    usuario: document.getElementById('nuevo-usuario').value.trim(),
    rol: document.getElementById('nuevo-rol').value,
    sede: document.getElementById('nuevo-sede').value,
    password: document.getElementById('nuevo-password').value,
    email: document.getElementById('nuevo-email').value.trim()
  };
  if (!item.nombre || !item.usuario || item.password.length < 8) { alert('Nombre, usuario y una contraseña de mínimo 8 caracteres son obligatorios.'); return; }
  const data = await llamar('usuarios_guardar', { item });
  if (data.ok) {
    avisarGuardado('Usuario creado.');
    ['nuevo-nombre','nuevo-usuario','nuevo-password','nuevo-email'].forEach(id => document.getElementById(id).value = '');
    cargar();
  } else {
    alert(data.error);
  }
});

cargar();
</script>
</body>
</html>
